name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Top-level concurrency and permissions
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs: # Single top-level jobs key
  test: # MCP stdio test job
    name: MCP Stdio Tests (Node ${{ matrix.node-version }})
    runs-on: macos-latest
    strategy:
      matrix:
        node-version: ["24.x"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Enable pnpm
        run: corepack enable pnpm
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build project
        run: pnpm run build
      - name: Run tests
        run: pnpm test

  build: # Existing build job (preserved from original file)
    name: Build and Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["24.x"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Enable pnpm
        run: corepack enable pnpm
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm run lint
      - name: Build
        run: pnpm run build
      - name: Check TypeScript compilation
        run: pnpm run typecheck

  validation: # Existing validation job (preserved and slightly updated for clarity)
    name: Validate Knowledge Base
    runs-on: ubuntu-latest
    needs: build # Should run after a successful build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Enable pnpm
        run: corepack enable pnpm
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x" # Using a specific Node version for consistency
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate Knowledge Base
        run: pnpm run validate

